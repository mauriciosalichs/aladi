{% extends "base.html" %}
{% block title %}{{ t.login_page_title }}{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">📚</div>
    <h1 class="login-title">Aladí Library Portal</h1>
    <p class="login-subtitle">{{ t.login_subtitle }}</p>

    <form method="POST" action="{{ url_for('login') }}" class="login-form">
      <div class="form-group">
        <label for="barcode" class="form-label">{{ t.login_barcode_label }}</label>
        <input
          type="text"
          id="barcode"
          name="barcode"
          class="form-input"
          placeholder="{{ t.login_barcode_placeholder }}"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label for="pin" class="form-label">{{ t.login_pin_label }}</label>
        <input
          type="password"
          id="pin"
          name="pin"
          class="form-input"
          placeholder="{{ t.login_pin_placeholder }}"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn btn--primary btn--full">{{ t.login_btn }}</button>
    </form>

    <p class="login-help">
      Diputació de Barcelona — <a href="https://aladi.diba.cat" target="_blank" rel="noopener">aladi.diba.cat</a>
    </p>
  </div>
</div>
{% endblock %}
