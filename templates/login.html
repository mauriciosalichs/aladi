{% extends "base.html" %}
{% block title %}Login — Aladí Library Portal{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">📚</div>
    <h1 class="login-title">Aladí Library Portal</h1>
    <p class="login-subtitle">Sign in with your library card</p>

    <form method="POST" action="{{ url_for('login') }}" class="login-form">
      <div class="form-group">
        <label for="barcode" class="form-label">Library Card Number / Barcode</label>
        <input
          type="text"
          id="barcode"
          name="barcode"
          class="form-input"
          placeholder="e.g. 2407817829"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label for="pin" class="form-label">PIN</label>
        <input
          type="password"
          id="pin"
          name="pin"
          class="form-input"
          placeholder="Your PIN"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn btn--primary btn--full">Sign in</button>
    </form>

    <p class="login-help">
      Diputació de Barcelona — <a href="https://aladi.diba.cat" target="_blank" rel="noopener">aladi.diba.cat</a>
    </p>
  </div>
</div>
{% endblock %}
